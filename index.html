<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeRogue Clone</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div id="game-container">
      <!-- Add this directly below your #game-container div -->

        <!-- Wave Display -->
        <div id="wave-display" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 20px; z-index: 5; font-weight: bold;">
            WAVE: <span id="wave-count">1</span>
        </div>

        <!-- Reward Overlay (Hidden by default) -->
        <div id="reward-screen">
            <h2 style="margin-bottom: 10px;">WAVE CLEARED!</h2>
            <p>Select a reward to continue:</p>
            <div class="reward-container">
                <button class="move-btn" onclick="applyReward('HEAL')">
                    <b>POTION</b><br><small>Heal 30 HP</small>
                </button>
                <button class="move-btn" onclick="applyReward('ATTACK')">
                    <b>X-ATTACK</b><br><small>+5 Damage</small>
                </button>
            </div>
        </div>

        <!-- Enemy Side -->
        <div id="enemy-stats" class="stat-box">
            <div id="enemy-name">LOADING...</div>
            <div class="hp-background">
                <div id="enemy-hp-fill" class="hp-fill"></div>
            </div>
        </div>
        <img id="enemy-sprite" class="pokemon-sprite" src="" alt="Enemy">

        <!-- Player Side -->
        <img id="player-sprite" class="pokemon-sprite" src="" alt="Player">
        <div id="player-stats" class="stat-box">
            <div id="player-name">LOADING...</div>
            <div class="hp-background">
                <div id="player-hp-fill" class="hp-fill"></div>
            </div>
        </div>

        <!-- Battle Menu -->
        <div id="battle-menu">
            <button class="move-btn" id="btn-1" onclick="handleAttack(0)">TACKLE</button>
            <button class="move-btn" id="btn-2" onclick="handleAttack(1)">GROWL</button>
            <button class="move-btn" id="btn-3" onclick="handleAttack(2)">QUICK ATTACK</button>
            <button class="move-btn" id="btn-4" onclick="handleAttack(3)">HEAL</button>
        </div>

        
    </div>

    <div id="battle-log-container">
      <div id="battle-log">
        <p>A wild Pokémon appeared!</p>
      </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
